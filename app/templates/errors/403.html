<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>403 - Acceso denegado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .error {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 72px; color: #e74c3c; margin: 0; }
        p { font-size: 18px; color: #666; }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #1F1528;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="error">
        <h1>403</h1>
        <p>No tienes acceso a esta página.</p>
        <a href="/login" class="btn-gold">Ir al Login</a>
    </div>
</body>
</html>
